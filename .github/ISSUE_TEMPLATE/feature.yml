name: Feature or plugin proposal
description: Propose a focused plugin, shared primitive, or improvement.
title: "[Proposal]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the workflow before proposing an API.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope and non-goals
    validations:
      required: true
  - type: textarea
    id: reuse
    attributes:
      label: Reuse plan
      description: Explain what belongs in the plugin versus @pmtechdev/mcp-kit.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy impact
      description: Cover authentication, data, mutations, external effects, bounds, and revocation.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Design checks
      options:
        - label: The proposal is least-privilege and read-only by default where possible.
          required: true
        - label: The proposal avoids arbitrary scripting, hidden telemetry, and credential harvesting.
          required: true
