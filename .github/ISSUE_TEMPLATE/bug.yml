name: Bug report
description: Report a reproducible PMTechDev plugin or shared-kit defect using synthetic data.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Never paste connected content, credentials, tokens, account IDs, private addresses, or vulnerability details. Report security issues privately through SECURITY.md.
  - type: input
    id: component
    attributes:
      label: Plugin or package
      placeholder: mailbridge-mcp or @pmtechdev/mcp-kit
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: vX.Y.Z or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15.x; Node 22.x or 24.x; Codex version …
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal synthetic reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized error
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed personal data, connected content, credentials, tokens, IDs, and private paths.
          required: true
        - label: This report does not disclose a security vulnerability.
          required: true
        - label: I did not mutate a real connected system while reproducing this issue.
          required: true
