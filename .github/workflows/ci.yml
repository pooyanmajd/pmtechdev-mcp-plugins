name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Workspace / Node ${{ matrix.node-version }} / macOS
    runs-on: macos-14
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    env:
      MAILBRIDGE_MODE: read-only
      CI: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install locked workspace dependencies
        run: npm ci

      - name: Run coverage, metadata, and packaged-plugin checks
        run: npm run check

      - name: Audit published dependency surface
        run: npm audit --omit=dev

      - name: Validate Mailbridge JXA
        run: node --check plugins/mailbridge-mcp/runtime/mailbridge.jxa.js && osacompile -l JavaScript -o "$RUNNER_TEMP/mailbridge.scpt" plugins/mailbridge-mcp/runtime/mailbridge.jxa.js

      - name: Verify committed plugin bundles are current
        run: git diff --exit-code -- plugins/*/dist

      - name: Confirm Mailbridge stays read-only in CI with no send surface
        run: test "$MAILBRIDGE_MODE" = "read-only" && ! grep -qE 'mail_send_draft|Mail\.send|sendDraft' plugins/mailbridge-mcp/runtime/mailbridge.jxa.js plugins/mailbridge-mcp/dist/cli.js

# CI never requests live connector credentials or macOS Automation permission.
