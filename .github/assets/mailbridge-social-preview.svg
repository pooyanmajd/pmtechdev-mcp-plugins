<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Mailbridge for Apple Mail</title>
  <desc id="desc">Local-first, multi-account, safety-first integration for Codex and Claude Code.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#142a45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66e3c4"/>
      <stop offset="1" stop-color="#4aa3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <circle cx="1110" cy="-20" r="320" fill="#4aa3ff" opacity=".08"/>
  <circle cx="960" cy="690" r="390" fill="#66e3c4" opacity=".06"/>

  <g transform="translate(86 105)" filter="url(#shadow)">
    <rect width="414" height="414" rx="92" fill="#0d1c2e" stroke="#2d4c69" stroke-width="3"/>
    <path d="M77 124c0-17 14-31 31-31h198c17 0 31 14 31 31v166c0 17-14 31-31 31H108c-17 0-31-14-31-31z" fill="none" stroke="url(#accent)" stroke-width="18"/>
    <path d="m92 118 115 100 115-100" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M207 321v-55" stroke="#f5f8fb" stroke-width="16" stroke-linecap="round"/>
    <circle cx="207" cy="292" r="8" fill="#f5f8fb"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="565" y="196" fill="#66e3c4" font-size="27" font-weight="700" letter-spacing="3">LOCAL APPLE MAIL CONNECTOR</text>
    <text x="565" y="281" fill="#f5f8fb" font-size="70" font-weight="760">Mailbridge</text>
    <text x="565" y="344" fill="#f5f8fb" font-size="43" font-weight="540">for Apple Mail</text>
    <text x="565" y="414" fill="#aebed0" font-size="28">Local-first · Multi-account · Safety-first</text>
    <g transform="translate(565 460)">
      <rect width="185" height="48" rx="24" fill="#172f49" stroke="#315675"/>
      <text x="92.5" y="32" text-anchor="middle" fill="#d8e7f4" font-size="20" font-weight="650">Codex</text>
      <rect x="200" width="220" height="48" rx="24" fill="#172f49" stroke="#315675"/>
      <text x="310" y="32" text-anchor="middle" fill="#d8e7f4" font-size="20" font-weight="650">Claude Code</text>
    </g>
  </g>
</svg>
